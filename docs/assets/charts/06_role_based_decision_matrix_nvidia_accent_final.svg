<text x="70" y="1304" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#4B5563" text-anchor="start">RTX 4090 | llama.cpp b9145 CUDA | GGUF | 23 GiB guard | custom task set</text>
